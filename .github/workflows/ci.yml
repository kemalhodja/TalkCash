name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: talkcash
          POSTGRES_PASSWORD: talkcash
          POSTGRES_DB: talkcash_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U talkcash -d talkcash_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://talkcash:talkcash@localhost:5432/talkcash_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key
      SCHEDULER_ENABLED: "false"
      RATE_LIMIT_ENABLED: "false"
      S3_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run unit tests
        working-directory: backend
        run: pytest tests/ -v --ignore=tests/e2e
      - name: Run E2E tests
        working-directory: backend
        run: pytest tests/e2e/ -v

  release-check:
    runs-on: ubuntu-latest
    needs: [backend, mobile]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify release script (no live API smoke)
        run: |
          pip install -r backend/requirements.txt
          npm --prefix mobile install
          bash scripts/validate-phase1.sh
          bash scripts/validate-phase2.sh
          bash scripts/validate-phase3.sh
          bash scripts/validate-phase4.sh
          bash scripts/validate-phase5.sh
          bash scripts/validate-phase6.sh
          bash scripts/validate-store-readiness.sh
          SKIP_TESTS=1 API_URL=http://127.0.0.1:1 bash scripts/verify-release.sh

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and test
        working-directory: mobile
        run: |
          npm install
          npx tsc --noEmit
          npm test
