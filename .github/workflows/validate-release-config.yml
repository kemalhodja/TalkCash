name: Validate Release Config

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.repository == 'kemalhodja/TalkCash'
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check required secrets and variables
        run: |
          set -e
          missing=0
          check() {
            if [ -z "$2" ]; then
              echo "MISSING: $1"
              missing=1
            else
              echo "OK: $1 configured"
            fi
          }
          check "FLY_API_TOKEN" "${{ secrets.FLY_API_TOKEN }}"
          check "EXPO_TOKEN" "${{ secrets.EXPO_TOKEN }}"
          check "EXPO_PUBLIC_API_URL" "${{ vars.EXPO_PUBLIC_API_URL }}"
          check "EAS_PROJECT_ID" "${{ vars.EAS_PROJECT_ID }}"
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "See docs/SETUP_RELEASE.md for setup instructions."
            exit 1
          fi

      - name: Validate Fly token
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl auth whoami

      - name: Validate Expo token
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate EAS project id format
        run: |
          pid="${{ vars.EAS_PROJECT_ID }}"
          if ! echo "$pid" | grep -qE '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
            echo "EAS_PROJECT_ID must be a UUID"
            exit 1
          fi
          if [ "$pid" = "00000000-0000-0000-0000-000000000000" ]; then
            echo "EAS_PROJECT_ID cannot be the nil UUID placeholder"
            exit 1
          fi
          echo "OK: EAS_PROJECT_ID format valid"

      - name: Summary
        run: |
          echo "Release config validated."
          echo "Next: Actions → Release Production (Full Pipeline) → confirm: release"
