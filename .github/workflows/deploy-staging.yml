name: Deploy Staging (Fly.io)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-staging.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'kemalhodja/eduai-sale' && secrets.FLY_API_TOKEN != ''
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_APP: talkcash-api
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Preflight
        run: bash scripts/preflight-staging.sh

      - name: Deploy to Fly.io
        working-directory: backend
        run: flyctl deploy --remote-only -a "$FLY_APP"

      - name: Smoke test staging API
        run: API_URL="https://${FLY_APP}.fly.dev" python3 scripts/smoke_test.py
