name: Deploy Render (Production)

on:
  push:
    branches: [main]
    paths:
      - render.yaml
      - backend/**
      - scripts/load_test.py
      - .github/workflows/render-deploy.yml
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    if: github.repository == 'kemalhodja/TalkCash'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend unit tests
        working-directory: backend
        env:
          RATE_LIMIT_ENABLED: "false"
          SCHEDULER_ENABLED: "false"
          APPLE_VERIFY_MOCK: "true"
        run: pip install -r requirements.txt && python -m pytest tests/ --ignore=tests/e2e -q

  health-check:
    runs-on: ubuntu-latest
    needs: verify
    if: github.repository == 'kemalhodja/TalkCash'
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy hook (optional)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -sf -X POST "$RENDER_DEPLOY_HOOK" && echo "Deploy hook fired"
          else
            echo "No RENDER_DEPLOY_HOOK — relying on Render auto-deploy from main push"
          fi

      - name: Wait for Render deploy (Blueprint auto-sync)
        run: |
          API="https://talkcash-api-prod.onrender.com"
          for i in $(seq 1 24); do
            BODY=$(curl -sf "$API/health" || true)
            if echo "$BODY" | grep -q '"launch_readiness"'; then
              echo "New build detected (launch_readiness present)"
              echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('launch_readiness', {}), indent=2))" 2>/dev/null || true
              API_URL="$API" python3 scripts/smoke_test.py
              exit 0
            fi
            if echo "$BODY" | grep -q '"database":true'; then
              echo "Attempt $i — old build still serving, waiting 30s..."
            else
              echo "Attempt $i — API not ready, waiting 30s..."
            fi
            sleep 30
          done
          echo "::warning::launch_readiness not found — sync Blueprint or set RENDER_DEPLOY_HOOK secret"
          curl -sf "$API/health" || true
          exit 1
