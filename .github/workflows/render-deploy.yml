name: Deploy Render (Production)

on:
  push:
    branches: [main]
    paths:
      - render.yaml
      - backend/**
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    if: github.repository == 'kemalhodja/TalkCash'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend unit tests
        working-directory: backend
        env:
          RATE_LIMIT_ENABLED: "false"
          SCHEDULER_ENABLED: "false"
        run: pip install -r requirements.txt && python -m pytest tests/ --ignore=tests/e2e -q

  health-check:
    runs-on: ubuntu-latest
    needs: verify
    if: github.repository == 'kemalhodja/TalkCash'
    steps:
      - name: Wait for Render deploy (Blueprint auto-sync)
        run: |
          API="https://talkcash-api-prod.onrender.com"
          for i in $(seq 1 20); do
            if curl -sf "$API/health" | grep -q '"database":true'; then
              echo "Render API live"
              API_URL="$API" python3 scripts/smoke_test.py
              exit 0
            fi
            echo "Attempt $i — waiting 30s..."
            sleep 30
          done
          echo "::warning::Render API not ready — apply Blueprint at dashboard.render.com if first deploy"
          curl -sf "$API/health" || true
