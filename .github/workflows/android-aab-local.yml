name: Android AAB (Gradle — No EAS)

on:
  workflow_dispatch:

jobs:
  aab:
    runs-on: ubuntu-latest
    if: github.repository == 'kemalhodja/TalkCash'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Validate signing secrets
        run: |
          missing=0
          [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] && echo "::error::Missing ANDROID_KEYSTORE_BASE64" && missing=1
          [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] && echo "::error::Missing ANDROID_KEYSTORE_PASSWORD" && missing=1
          [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ] && echo "::error::Missing ANDROID_KEY_ALIAS" && missing=1
          [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ] && echo "::error::Missing ANDROID_KEY_PASSWORD" && missing=1
          if [ "$missing" -ne 0 ]; then
            echo "See docs/ANDROID_AAB_GRADLE.md"
          fi
          exit $missing

      - name: Install release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p mobile/android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > mobile/android/app/release.keystore
          printf 'storeFile=release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            "${{ secrets.ANDROID_KEY_ALIAS }}" \
            "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            > mobile/android/keystore.properties

      - name: Build production AAB
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_FILE: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          EXPO_PUBLIC_API_URL: https://talkcash-api-prod.onrender.com/api/v1
          EXPO_PUBLIC_APP_ENV: production
          EXPO_PUBLIC_PRIVACY_URL: https://talkcash-api-prod.onrender.com/privacy
          EXPO_PUBLIC_TERMS_URL: https://talkcash-api-prod.onrender.com/terms
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
          DIST_DIR: ${{ github.workspace }}/dist
        run: bash scripts/build-aab-gradle.sh

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: talkcash-production-aab
          path: dist/talkcash-prod.aab
          retention-days: 30

      - name: Summary
        run: |
          echo "### AAB (Gradle, no EAS)" >> "$GITHUB_STEP_SUMMARY"
          ls -lh dist/talkcash-prod.aab >> "$GITHUB_STEP_SUMMARY"
