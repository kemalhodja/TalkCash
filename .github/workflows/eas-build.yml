name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        default: "android"
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: "EAS build profile"
        required: true
        default: "development"
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Expo / EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      - name: Validate build env
        if: github.event.inputs.profile != 'development'
        run: |
          if [ -z "${{ vars.EXPO_PUBLIC_API_URL }}" ]; then
            echo "Set repository variable EXPO_PUBLIC_API_URL for preview/production builds"
            exit 1
          fi

      - name: EAS build
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'http://localhost:8000/api/v1' }}
          EAS_PROJECT_ID: ${{ vars.EAS_PROJECT_ID }}
        run: |
          PLATFORM="${{ github.event.inputs.platform }}"
          PROFILE="${{ github.event.inputs.profile }}"
          if [ "$PLATFORM" = "all" ]; then
            eas build --profile "$PROFILE" --platform all --non-interactive
          else
            eas build --profile "$PROFILE" --platform "$PLATFORM" --non-interactive
          fi
