name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        default: "android"
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.repository == 'kemalhodja/eduai-sale'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Expo / EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      - name: Validate build env
        if: github.event.inputs.profile != 'development'
        run: |
          if [ -z "${{ vars.EXPO_PUBLIC_API_URL }}" ]; then
            echo "Set repository variable EXPO_PUBLIC_API_URL for preview/production builds"
            exit 1
          fi
          if [ "${{ github.event.inputs.profile }}" = "production" ] && [ -z "${{ vars.EAS_PROJECT_ID }}" ]; then
            echo "Set repository variable EAS_PROJECT_ID for production builds"
            exit 1
          fi

      - name: EAS build
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'http://localhost:8000/api/v1' }}
          EAS_PROJECT_ID: ${{ vars.EAS_PROJECT_ID }}
        run: |
          PLATFORM="${{ github.event.inputs.platform }}"
          PROFILE="${{ github.event.inputs.profile }}"
          WAIT_FLAG=""
          if [ "$PROFILE" = "preview" ] && [ "$PLATFORM" = "android" ]; then
            WAIT_FLAG="--wait"
          fi
          if [ "$PLATFORM" = "all" ]; then
            eas build --profile "$PROFILE" --platform all --non-interactive $WAIT_FLAG
          else
            eas build --profile "$PROFILE" --platform "$PLATFORM" --non-interactive $WAIT_FLAG
          fi

      - name: Download Android preview APK
        if: github.event.inputs.profile == 'preview' && github.event.inputs.platform == 'android'
        working-directory: mobile
        run: |
          mkdir -p ../dist
          eas build:download --platform android --latest --output ../dist/talkcash-preview.apk

      - name: Upload APK artifact
        if: github.event.inputs.profile == 'preview' && github.event.inputs.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: talkcash-preview-apk
          path: dist/talkcash-preview.apk
          retention-days: 14
