name: Deploy Production (Fly.io)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "production" to confirm deploy'
        required: true

jobs:
  config:
    runs-on: ubuntu-latest
    if: github.repository == 'kemalhodja/TalkCash' && github.event.inputs.confirm == 'production'
    steps:
      - name: Require FLY_API_TOKEN
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "::error::Missing GitHub secret FLY_API_TOKEN — see docs/SETUP_RELEASE.md"
            exit 1
          fi
          echo "FLY_API_TOKEN configured"

  deploy:
    runs-on: ubuntu-latest
    needs: config
    if: github.repository == 'kemalhodja/TalkCash' && github.event.inputs.confirm == 'production'
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_APP: talkcash-api-prod
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Preflight
        run: bash scripts/preflight-production.sh

      - name: Deploy to Fly.io production
        working-directory: backend
        run: flyctl deploy --remote-only -a "$FLY_APP" --config fly.prod.toml

      - name: Smoke test production API
        run: API_URL="https://${FLY_APP}.fly.dev" python3 scripts/smoke_test.py
