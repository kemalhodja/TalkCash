# Fly.io production API
# Deploy: fly deploy --config fly.prod.toml (from backend/)
# Setup: ./scripts/setup-fly-prod.sh

app = "talkcash-api-prod"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  SCHEDULER_ENABLED = "true"
  DEBUG = "false"
  RATE_LIMIT_ENABLED = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "25s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
