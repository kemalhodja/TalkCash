<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalkCash — Token Ön Satışı</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/web3@1.7.3/dist/web3.min.js"></script>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">
      <div class="logo-icon">💬</div>
      TalkCash
    </a>
    <a href="index.html" class="btn btn-outline">Ana Sayfa</a>
  </nav>

  <div class="sale-container">
    <div class="sale-card">
      <h1>TALK Token Ön Satışı</h1>
      <p class="subtitle">Erken katılımcılara özel fiyat</p>

      <div class="sale-info">
        <p>Oran: <strong>1 BNB = 10.000 TALK</strong></p>
        <p>Minimum alım: <strong>0.01 BNB</strong></p>
        <p>Ağ: <strong>Binance Smart Chain (BSC)</strong></p>
      </div>

      <button class="btn btn-outline sale-btn" onclick="connectWallet()">Cüzdanı Bağla</button>
      <p class="wallet-address" id="walletAddress"></p>

      <input
        type="number"
        id="bnbAmount"
        class="sale-input"
        placeholder="BNB miktarı girin"
        min="0.01"
        step="0.01"
      />
      <p id="tokenPreview" style="color: var(--accent); font-size: 0.9rem; min-height: 1.2em;"></p>

      <button class="btn btn-primary sale-btn" onclick="buyTokens()">TALK Satın Al</button>
      <p class="status" id="status"></p>
    </div>
  </div>

  <script src="js/wallet.js"></script>
</body>
</html>
