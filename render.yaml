# TalkCash API — Render Blueprint (self-contained: Postgres + Redis + API)
# Dashboard: New → Blueprint → GitHub kemalhodja/TalkCash → Apply
# Push to main syncs this file automatically when Blueprint is linked.

databases:
  - name: talkcash-db
    plan: free
    region: frankfurt
    ipAllowList: []

services:
  - type: keyvalue
    name: talkcash-redis
    plan: free
    region: frankfurt
    ipAllowList: []

  - type: web
    name: talkcash-api-prod
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: frankfurt
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: talkcash-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: talkcash-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://talkcash-api-prod.onrender.com"
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: DEBUG
        value: "false"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: S3_ENABLED
        value: "false"
      - key: GOOGLE_PLAY_PACKAGE_NAME
        value: io.talkcash.app
      - key: GOOGLE_PLAY_VERIFY_MOCK
        value: "true"
      - key: INTERNAL_UPGRADE_SECRET
        value: "talkcash-internal-test-2026"
      - key: SENTRY_ENVIRONMENT
        value: production
