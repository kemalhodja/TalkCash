services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: talkcash
      POSTGRES_PASSWORD: talkcash
      POSTGRES_DB: talkcash
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talkcash"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: talkcash
      MINIO_ROOT_PASSWORD: talkcash123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 talkcash talkcash123;
      mc mb local/talkcash --ignore-existing;
      mc anonymous set download local/talkcash;
      exit 0;
      "

  backend:
    build: ./backend
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      DATABASE_URL: postgresql+asyncpg://talkcash:talkcash@db:5432/talkcash
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-true}
      INTERNAL_UPGRADE_SECRET: ${INTERNAL_UPGRADE_SECRET:-dev-upgrade-secret}
      GOOGLE_PLAY_VERIFY_MOCK: ${GOOGLE_PLAY_VERIFY_MOCK:-true}
      GOOGLE_PLAY_PACKAGE_NAME: io.talkcash.app
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_RTDN_WEBHOOK_SECRET: ${GOOGLE_RTDN_WEBHOOK_SECRET:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@talkcash.io}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SCHEDULER_ENABLED: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      S3_ENABLED: "true"
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: talkcash
      S3_SECRET_KEY: talkcash123
      S3_BUCKET: talkcash
      S3_PUBLIC_URL: http://localhost:9000/talkcash
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - uploads:/app/uploads

volumes:
  pgdata:
  miniodata:
  uploads:
