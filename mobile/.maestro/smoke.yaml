appId: io.talkcash.app
---
# TalkCash smoke — requires dev/preview build on device/emulator
- runFlow: login.yaml
- runFlow: go-input.yaml
- tapOn:
    id: "input-show-advanced"
    optional: true
- tapOn:
    text: "Gelişmiş giriş|Advanced input"
    optional: true
- tapOn:
    id: "quick-expense-btn"
    optional: true
- tapOn:
    text: "İptal|Cancel"
    optional: true
- runFlow: go-settings.yaml
- tapOn:
    id: "settings-load-demo"
    optional: true
- assertVisible:
    text: "Örnek veri|Sample data|Senkron|Sync|Asistan|Assistant"
    optional: true
- assertVisible:
    text: "Asistan Kişiliği|Assistant Persona|Fısıltı|Whisper"
    optional: true
